<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Group SMS Sender</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --card: #1a2236;
    --border: #2a3a55;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #64748b;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
  }
  h1 {
    text-align: center;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    max-width: 900px;
    margin: 0 auto;
  }
  @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }
  .card-title {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 14px;
  }
  label { font-size: 0.8rem; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; }
  input, textarea, select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    padding: 10px 12px;
    outline: none;
    transition: border 0.2s;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--accent); }
  textarea { resize: vertical; min-height: 100px; }
  .char-bar-wrap { margin-top: 6px; }
  .char-info { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  .char-bar { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .char-fill { height: 100%; border-radius: 4px; transition: width 0.2s, background 0.2s; background: var(--green); }
  .phone-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; margin-top: 8px; }
  .phone-item {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 10px;
  }
  .phone-item span { flex: 1; font-size: 0.85rem; }
  .phone-item .name { font-weight: 600; color: var(--text); }
  .phone-item .num { color: var(--muted); font-size: 0.78rem; }
  .del-btn {
    background: none; border: none; color: var(--red);
    cursor: pointer; font-size: 1.1rem; padding: 0 4px;
  }
  .add-row { display: flex; gap: 8px; margin-top: 10px; }
  .add-row input { flex: 1; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    padding: 10px 20px; border-radius: 12px; font-size: 0.85rem; font-weight: 600;
    z-index: 999; transition: transform 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); color: var(--red); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .import-phone-btn {
    width: 100%; margin-top: 8px; padding: 9px; border-radius: 10px;
    background: linear-gradient(135deg, #1a2236, #1e3a5f);
    border: 1.5px dashed var(--accent); color: var(--accent);
    font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.82rem;
    cursor: pointer; transition: background 0.2s;
  }
  .import-phone-btn:hover { background: rgba(0,212,255,0.08); }
  .btn {
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Outfit', sans-serif; font-weight: 700;
    padding: 10px 18px; font-size: 0.88rem; transition: opacity 0.2s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-green { background: var(--green); color: #fff; }
  .btn-sm { padding: 7px 12px; font-size: 0.78rem; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  /* Schedule */
  .days-grid { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .day-btn {
    padding: 7px 12px; border-radius: 8px; font-size: 0.78rem; font-weight: 700;
    border: 1.5px solid var(--border); background: var(--surface); color: var(--muted);
    cursor: pointer; transition: all 0.15s; font-family: 'Outfit', sans-serif;
  }
  .day-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.12); color: var(--accent); }
  /* Log */
  .log { max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
  .log-item {
    display: flex; align-items: flex-start; gap: 8px;
    background: var(--surface); border-radius: 8px; padding: 8px 10px;
    font-size: 0.8rem;
  }
  .log-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
  .log-dot.sent { background: var(--green); }
  .log-dot.fail { background: var(--red); }
  .log-dot.info { background: var(--accent); }
  .log-name { font-weight: 600; }
  .log-time { color: var(--muted); font-size: 0.72rem; }
  /* Stats */
  .stats-row { display: flex; gap: 10px; }
  .stat {
    flex: 1; background: var(--surface); border-radius: 10px;
    padding: 12px; text-align: center;
  }
  .stat-num { font-size: 1.6rem; font-weight: 900; }
  .stat-lbl { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .full { grid-column: 1 / -1; }
  .send-btn {
    width: 100%; padding: 14px; font-size: 1rem; border-radius: 12px;
    background: linear-gradient(135deg, var(--green), #059669);
    color: #fff; border: none; cursor: pointer; font-family: 'Outfit', sans-serif;
    font-weight: 900; letter-spacing: 1px; transition: opacity 0.2s;
    margin-top: 6px;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .schedule-status {
    font-size: 0.78rem; color: var(--warning);
    background: rgba(245,158,11,0.1); border-radius: 8px;
    padding: 8px 12px; margin-top: 10px;
  }
  .progress-wrap { margin-top: 12px; display: none; }
  .progress-bar { height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 8px; transition: width 0.3s; }
  .progress-txt { font-size: 0.78rem; color: var(--muted); margin-top: 4px; text-align: center; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<h1>📱 Group SMS Sender</h1>
<p class="subtitle">ለቡድን ሳምንታዊ SMS መላኪያ · Max 4,000 chars</p>

<div class="grid">

  <!-- Message -->
  <div class="card">
    <div class="card-title">✉️ መልዕክት</div>
    <label>የ SMS መልዕክት (ከፍተኛ 4,000 ፊደላት)</label>
    <textarea id="msgInput" placeholder="መልዕክትዎን እዚህ ይጻፉ..." oninput="updateChar()"></textarea>
    <div class="char-bar-wrap">
      <div class="char-info">
        <span id="charCount">0 / 4,000</span>
        <span id="smsCount">1 SMS</span>
      </div>
      <div class="char-bar"><div class="char-fill" id="charFill" style="width:0%"></div></div>
    </div>
    <label style="margin-top:14px;">📅 ሳምንታዊ ቀናት</label>
    <div class="days-grid">
      <button class="day-btn" data-day="0" onclick="toggleDay(this)">እሑድ</button>
      <button class="day-btn" data-day="1" onclick="toggleDay(this)">ሰኞ</button>
      <button class="day-btn" data-day="2" onclick="toggleDay(this)">ማክሰኞ</button>
      <button class="day-btn" data-day="3" onclick="toggleDay(this)">ረቡዕ</button>
      <button class="day-btn" data-day="4" onclick="toggleDay(this)">ሓሙስ</button>
      <button class="day-btn" data-day="5" onclick="toggleDay(this)">ዓርብ</button>
      <button class="day-btn" data-day="6" onclick="toggleDay(this)">ቅዳሜ</button>
    </div>
    <label>⏰ የመላኪያ ሰዓት</label>
    <input type="time" id="schedTime" value="08:00">
    <div class="schedule-status" id="schedStatus" style="display:none"></div>
  </div>

  <!-- Contacts -->
  <div class="card">
    <div class="card-title">👥 ተቀባዮች</div>
    <button class="import-phone-btn" onclick="importFromPhone()">📲 ከስልክ ደብተር አምጣ (Contacts)</button>
    <div class="add-row">
      <input type="text" id="newName" placeholder="ስም">
      <input type="tel" id="newPhone" placeholder="+251..." onkeydown="if(event.key==='Enter')addContact()">
      <button class="btn btn-primary btn-sm" onclick="addContact()">+</button>
    </div>
    <div style="margin-top:8px; display:flex; gap:6px;">
      <button class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);" onclick="importCSV()">📂 CSV</button>
      <button class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);" onclick="exportCSV()">💾 Export</button>
      <span style="flex:1"></span>
      <span id="contactCount" style="font-size:0.75rem;color:var(--muted);line-height:2.2;">0 ሰዎች</span>
    </div>
    <div class="phone-list" id="phoneList"></div>
    <input type="file" id="csvFile" accept=".csv" style="display:none" onchange="readCSV(event)">
  </div>

  <!-- Stats -->
  <div class="card">
    <div class="card-title">📊 ስታቲስቲክስ</div>
    <div class="stats-row">
      <div class="stat"><div class="stat-num" id="stTotal" style="color:var(--accent)">0</div><div class="stat-lbl">ድምር</div></div>
      <div class="stat"><div class="stat-num" id="stSent" style="color:var(--green)">0</div><div class="stat-lbl">ተላከ</div></div>
      <div class="stat"><div class="stat-num" id="stFail" style="color:var(--red)">0</div><div class="stat-lbl">አልተላከም</div></div>
    </div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-txt" id="progressTxt">0%</div>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendAll()">🚀 ሁሉንም ላክ</button>
  </div>

  <!-- Log -->
  <div class="card">
    <div class="card-title" style="display:flex;justify-content:space-between;align-items:center;">
      <span>📋 ታሪክ</span>
      <button class="btn btn-sm" style="background:var(--surface);border:1px solid var(--border);color:var(--muted);" onclick="clearLog()">አጽዳ</button>
    </div>
    <div class="log" id="logList">
      <div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:20px">
        ሎጎ ባዶ ነው
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
let contacts = JSON.parse(localStorage.getItem('sms_contacts') || '[]');
let logs = JSON.parse(localStorage.getItem('sms_logs') || '[]');
let schedDays = JSON.parse(localStorage.getItem('sms_days') || '[]');
let schedInterval = null;

const MAX_CHARS = 4000;

function save() {
  localStorage.setItem('sms_contacts', JSON.stringify(contacts));
  localStorage.setItem('sms_logs', JSON.stringify(logs));
  localStorage.setItem('sms_days', JSON.stringify(schedDays));
}

function render() {
  // contacts
  const list = document.getElementById('phoneList');
  if (contacts.length === 0) {
    list.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:20px">ምንም ተቀባይ የለም</div>';
  } else {
    list.innerHTML = contacts.map((c,i) => `
      <div class="phone-item">
        <span>
          <div class="name">${esc(c.name || 'ስም የለም')}</div>
          <div class="num">${esc(c.phone)}</div>
        </span>
        <button class="del-btn" onclick="removeContact(${i})">✕</button>
      </div>`).join('');
  }
  document.getElementById('contactCount').textContent = contacts.length + ' ሰዎች';
  document.getElementById('stTotal').textContent = contacts.length;

  // logs
  const logEl = document.getElementById('logList');
  if (logs.length === 0) {
    logEl.innerHTML = '<div style="color:var(--muted);font-size:0.8rem;text-align:center;padding:20px">ሎጎ ባዶ ነው</div>';
  } else {
    logEl.innerHTML = [...logs].reverse().map(l => `
      <div class="log-item">
        <div class="log-dot ${l.type}"></div>
        <div style="flex:1">
          <span class="log-name">${esc(l.name)}</span>
          <span style="color:var(--muted)"> · ${esc(l.phone)}</span>
          <div class="log-time">${l.msg} · ${l.time}</div>
        </div>
      </div>`).join('');
  }

  // stats
  const sent = logs.filter(l=>l.type==='sent').length;
  const fail = logs.filter(l=>l.type==='fail').length;
  document.getElementById('stSent').textContent = sent;
  document.getElementById('stFail').textContent = fail;

  // schedule days
  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.classList.toggle('active', schedDays.includes(+btn.dataset.day));
  });
  updateScheduleStatus();
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateChar() {
  const v = document.getElementById('msgInput').value;
  const n = v.length;
  const pct = Math.min(n / MAX_CHARS * 100, 100);
  document.getElementById('charCount').textContent = n.toLocaleString() + ' / ' + MAX_CHARS.toLocaleString();
  document.getElementById('smsCount').textContent = Math.ceil(n / 160) + ' SMS segment' + (Math.ceil(n/160)>1?'s':'');
  const fill = document.getElementById('charFill');
  fill.style.width = pct + '%';
  fill.style.background = n > MAX_CHARS ? 'var(--red)' : n > 3500 ? 'var(--warning)' : 'var(--green)';
}

function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function normalizePhone(p) {
  return p.replace(/[\s\-().]/g, '');
}

function isDuplicate(phone) {
  const norm = normalizePhone(phone);
  return contacts.some(c => normalizePhone(c.phone) === norm);
}

function addContact() {
  const name = document.getElementById('newName').value.trim();
  const phone = document.getElementById('newPhone').value.trim();
  if (!phone) { showToast('⚠️ ስልክ ቁጥር ያስፈልጋል!', 'error'); return; }
  if (isDuplicate(phone)) {
    showToast('❌ ይህ ቁጥር አስቀድሞ አለ: ' + phone, 'error'); return;
  }
  contacts.push({ name, phone });
  document.getElementById('newName').value = '';
  document.getElementById('newPhone').value = '';
  showToast('✅ ' + (name||phone) + ' ተጨምሯል!', 'success');
  save(); render();
}

async function importFromPhone() {
  if (!('contacts' in navigator && 'ContactsManager' in window)) {
    showToast('⚠️ ይህ አሠራር በዚህ አሳሽ አይደገፍም። Chrome/Android ይጠቀሙ።', 'error');
    return;
  }
  try {
    const props = ['name', 'tel'];
    const opts = { multiple: true };
    const results = await navigator.contacts.select(props, opts);
    if (!results || results.length === 0) { showToast('ምንም አልተመረጠም', 'info'); return; }
    let added = 0, dupes = 0;
    results.forEach(contact => {
      const name = (contact.name && contact.name[0]) || '';
      (contact.tel || []).forEach(tel => {
        const phone = tel.trim();
        if (!phone) return;
        if (isDuplicate(phone)) { dupes++; return; }
        contacts.push({ name, phone });
        added++;
      });
    });
    save(); render();
    let msg = `✅ ${added} ሰዎች ተጨምረዋል`;
    if (dupes > 0) msg += ` · ${dupes} ድግምት ተዘለለ`;
    showToast(msg, added > 0 ? 'success' : 'error');
  } catch(e) {
    showToast('❌ ስህተት: ' + e.message, 'error');
  }
}

function removeContact(i) {
  contacts.splice(i,1);
  save(); render();
}

function toggleDay(btn) {
  const d = +btn.dataset.day;
  const idx = schedDays.indexOf(d);
  if (idx>=0) schedDays.splice(idx,1); else schedDays.push(d);
  save(); render();
}

function updateScheduleStatus() {
  const el = document.getElementById('schedStatus');
  if (schedDays.length === 0) { el.style.display = 'none'; return; }
  const dayNames = ['እሑድ','ሰኞ','ማክሰኞ','ረቡዕ','ሓሙስ','ዓርብ','ቅዳሜ'];
  const names = schedDays.sort().map(d=>dayNames[d]).join(', ');
  const time = document.getElementById('schedTime').value;
  el.style.display = 'block';
  el.textContent = `⏰ ቀጣይ ልኬት: ${names} ሰዓት ${time}`;
}

document.getElementById('schedTime').addEventListener('change', updateScheduleStatus);

// Simulated send
async function sendAll() {
  const msg = document.getElementById('msgInput').value.trim();
  if (!msg) { alert('መልዕክት ያስፈልጋል!'); return; }
  if (msg.length > MAX_CHARS) { alert('መልዕክቱ ከ4,000 ፊደላት አልፏል!'); return; }
  if (contacts.length === 0) { alert('ቢያንስ አንድ ተቀባይ ያስፈልጋል!'); return; }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  const pw = document.getElementById('progressWrap');
  pw.style.display = 'block';

  for (let i = 0; i < contacts.length; i++) {
    const c = contacts[i];
    const pct = Math.round((i+1)/contacts.length*100);
    document.getElementById('progressFill').style.width = pct+'%';
    document.getElementById('progressTxt').textContent = `${i+1} / ${contacts.length} (${pct}%)`;
    await delay(300 + Math.random()*200);
    // Simulate: 95% success
    const ok = Math.random() > 0.05;
    const now = new Date().toLocaleTimeString('am-ET');
    logs.push({ type: ok?'sent':'fail', name: c.name||'ስም የለም', phone: c.phone, msg: ok?'ተላከ ✓':'አልተላከም ✗', time: now });
  }

  logs.push({ type:'info', name:'ስርዓት', phone:'—', msg:`${contacts.length} ሰዎች · ልኬት ተጠናቋል`, time: new Date().toLocaleTimeString('am-ET') });
  save(); render();
  btn.disabled = false;
  document.getElementById('progressTxt').textContent = '✅ ተጠናቋል!';
}

function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

function clearLog() { logs=[]; save(); render(); }

function importCSV() { document.getElementById('csvFile').click(); }
function readCSV(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    const lines = ev.target.result.split('\n');
    let added = 0, dupes = 0;
    lines.forEach(line => {
      const parts = line.split(',');
      if (parts.length >= 1) {
        const name = (parts[0]||'').trim();
        const phone = (parts[1]||parts[0]||'').trim();
        if (phone && phone.match(/[\d+]/)) {
          if (isDuplicate(phone)) { dupes++; return; }
          contacts.push({name, phone}); added++;
        }
      }
    });
    save(); render();
    let msg = added + ' ሰዎች ተጨምረዋል';
    if (dupes > 0) msg += ' · ' + dupes + ' ድግምት ተዘለለ';
    showToast('✅ ' + msg, 'success');
  };
  r.readAsText(f);
  e.target.value = '';
}
function exportCSV() {
  const csv = contacts.map(c=>`${c.name},${c.phone}`).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent('ስም,ስልክ\n'+csv);
  a.download = 'contacts.csv'; a.click();
}

render(); updateChar();
</script>
