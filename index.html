    const { useState, useEffect, useRef } = React;

    /* ══ Persistent storage (localStorage) ══ */
    const store = {
      get(k) {
        try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; }
      },
      set(k, v) {
        try { localStorage.setItem(k, JSON.stringify(v)); } catch {}
      },
    };

    const normalize = (p) => p ? p.replace(/\D/g, "").slice(-9) : "";
    const dedup = (arr) => {
      const seen = new Set();
      return arr.filter(c => { const p = normalize(c.phone); if (!p || seen.has(p)) return false; seen.add(p); return true; });
    };
    const initials = (n) => (n || "?").split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);

    const VERSES = [
      "قُلْ هُوَ اللَّهُ أَحَدٌ ❧ جُمُعَة مُبَارَكَة",
      "إِنَّ اللَّهَ وَمَلَائِكَتَهُ يُصَلُّونَ عَلَى النَّبِيِّ ❧ جُمُعَة مُبَارَكَة",
      "يَا أَيُّهَا الَّذِينَ آمَنُوا إِذَا نُودِيَ لِلصَّلَاةِ مِن يَوْمِ الْجُمُعَةِ ❧ جُمُعَة مُبَارَكَة",
      "وَذَكِّرْ فَإِنَّ الذِّكْرَى تَنفَعُ الْمُؤْمِنِينَ ❧ جُمُعَة مُبَارَكَة",
      "إِنَّمَا الْمُؤْمِنُونَ إِخْوَةٌ ❧ جُمُعَة مُبَارَكَة",
    ];

    /* ══ Parse vCard (.vcf) files ══ */
    function parseVcf(text) {
      const contacts = [];
      const cards = text.split(/BEGIN:VCARD/i).slice(1);
      for (const card of cards) {
        let name = "";
        const phones = [];
        const lines = card.split(/\r?\n/);
        for (const line of lines) {
          const upper = line.toUpperCase();
          if (upper.startsWith("FN:")) {
            name = line.slice(3).trim();
          } else if (upper.startsWith("N:") && !name) {
            const parts = line.slice(2).split(";");
            name = [parts[1], parts[0]].filter(Boolean).join(" ").trim();
          } else if (upper.includes("TEL")) {
            const val = line.split(":").slice(1).join(":").trim();
            const n = normalize(val);
            if (n.length >= 9) phones.push(n);
          }
        }
        for (const phone of phones) {
          contacts.push({ id: Date.now() + Math.random(), name: name || phone, phone });
        }
      }
      return contacts;
    }

    /* ══ Parse CSV / TXT ══ */
    function parseCsvTxt(text) {
      const parsed = [];
      const lines = text.split("\n").filter(l => l.trim());
      for (const line of lines) {
        const parts = line.split(",");
        if (parts.length >= 2) {
          const n = parts[0].trim(); const p = normalize(parts[1]);
          if (p.length >= 9) parsed.push({ id: Date.now() + Math.random(), name: n || p, phone: p });
        } else {
          const p = normalize(line);
          if (p.length >= 9) parsed.push({ id: Date.now() + Math.random(), name: p, phone: p });
        }
      }
      return parsed;
    }

    function App() {
      const [tab, setTab] = useState("contacts");
      const [contacts, setContacts] = useState([]);
      const [groups, setGroups] = useState([]);
      const [reports, setReports] = useState([]);
      const [loading, setLoading] = useState(true);
      const [cName, setCName] = useState("");
      const [cPhone, setCPhone] = useState("");
      const [search, setSearch] = useState("");
      const [selMode, setSelMode] = useState(false);
      const [selIds, setSelIds] = useState(new Set());
      const [gName, setGName] = useState("");
      const [openGrp, setOpenGrp] = useState(null);
      const [grpView, setGrpView] = useState("list");
      const [addSel, setAddSel] = useState(new Set());
      const [msgGroup, setMsgGroup] = useState(null);
      const [message, setMessage] = useState("");
      const [sending, setSending] = useState(false);
      const [progress, setProgress] = useState(0);
      const [sentN, setSentN] = useState(0);
      const [totalN, setTotalN] = useState(0);
      const [justDone, setJustDone] = useState(false);
      const [reportExpand, setReportExpand] = useState({});
      const [importMsg, setImportMsg] = useState(null); // {type, text}
      const [pasteText, setPasteText] = useState("");
      const [showPaste, setShowPaste] = useState(false);
      const [showVcfGuide, setShowVcfGuide] = useState(false);
      const cancelRef = useRef(false);
      const vcfRef = useRef();
      const csvRef = useRef();

      useEffect(() => {
        const c = store.get("contacts"); if (c) setContacts(c);
        const g = store.get("groups"); if (g) setGroups(g);
        const r = store.get("reports"); if (r) setReports(r);
        setLoading(false);
      }, []);

      const saveC = (list) => { setContacts(list); store.set("contacts", list); };
      const saveG = (list) => { setGroups(list); store.set("groups", list); };
      const saveR = (list) => { setReports(list); store.set("reports", list); };

      const showMsg = (type, text) => {
        setImportMsg({ type, text });
        setTimeout(() => setImportMsg(null), 4000);
      };

      /* ── Email backup ── */
      const emailBackup = () => {
        const data = { exportedAt: new Date().toLocaleString("am-ET"), contacts, groups, reports };
        const json = JSON.stringify(data, null, 2);
        const subject = encodeURIComponent("ጁምዓ SMS Backup — " + new Date().toLocaleDateString("am-ET"));
        const body = encodeURIComponent("የጁምዓ SMS ውሂብ ምትኬ ይህ ነው:\n\n" + json);
        window.location.href = `mailto:?subject=${subject}&body=${body}`;
      };

      /* ── Contact Picker API (Android Chrome only) ── */
      const importFromPhone = async () => {
        try {
          if (!("contacts" in navigator) || !("ContactsManager" in window)) {
            showMsg("err", "❌ ይህ browser Contact Picker አይደግፍም። Android Chrome ላይ ሞክር ወይም VCF ፋይል ተጠቀም።");
            return;
          }
          const picked = await navigator.contacts.select(["name", "tel"], { multiple: true });
          if (!picked || picked.length === 0) return;
          const parsed = [];
          for (const p of picked) {
            const name = p.name?.[0] || "";
            for (const tel of (p.tel || [])) {
              const phone = normalize(tel);
              if (phone.length >= 9) parsed.push({ id: Date.now() + Math.random(), name: name || phone, phone });
            }
          }
          const before = contacts.length;
          const merged = dedup([...contacts, ...parsed]);
          saveC(merged);
          showMsg("success", `✅ ${parsed.length} contacts ተነበቡ! ${merged.length - before} አዲስ ተጨምሯል።`);
        } catch (e) {
          showMsg("err", "❌ ከስልኬ ማስገባት አልተቻለም: " + e.message);
        }
      };

      /* ── VCF file import ── */
      const handleVcf = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const parsed = parseVcf(ev.target.result);
            if (parsed.length === 0) { showMsg("err", "❌ VCF ፋይሉ ውስጥ ስልክ ቁጥር አልተገኘም።"); return; }
            const before = contacts.length;
            const merged = dedup([...contacts, ...parsed]);
            saveC(merged);
            showMsg("success", `✅ ${parsed.length} contacts ተነበቡ! ${merged.length - before} አዲስ ተጨምሯል።`);
          } catch (err) {
            showMsg("err", "❌ ፋይሉን ማንበብ አልተቻለም: " + err.message);
          }
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      /* ── CSV / TXT file import ── */
      const handleCsv = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          const parsed = parseCsvTxt(ev.target.result);
          if (parsed.length === 0) { showMsg("err", "❌ CSV ፋイሉ ውስጥ ቁጥር አልተገኘም። ቅርጸቱ: ስም,ስልክ"); return; }
          const before = contacts.length;
          const merged = dedup([...contacts, ...parsed]);
          saveC(merged);
          showMsg("success", `✅ ${parsed.length} contacts ተነበቡ! ${merged.length - before} አዲስ ተጨምሯል።`);
        };
        reader.readAsText(file);
        e.target.value = "";
      };

      /* ── Paste numbers ── */
      const handlePaste = () => {
        if (!pasteText.trim()) return;
        const parsed = parseCsvTxt(pasteText);
        // also try plain number lines
        const extra = [];
        for (const line of pasteText.split(/\n/).filter(l => l.trim())) {
          const p = normalize(line);
          if (p.length >= 9 && !parsed.find(x => normalize(x.phone) === p)) {
            extra.push({ id: Date.now() + Math.random(), name: p, phone: p });
          }
        }
        const all = [...parsed, ...extra];
        if (all.length === 0) { showMsg("err", "❌ ቁጥር አልተገኘም።"); return; }
        const before = contacts.length;
        const merged = dedup([...contacts, ...all]);
        saveC(merged);
        setPasteText("");
        setShowPaste(false);
        showMsg("success", `✅ ${all.length} ቁጥሮች ተነበቡ! ${merged.length - before} አዲስ ተጨምሯል።`);
      };

      /* ── Manual add ── */
      const addContact = () => {
        const phone = normalize(cPhone);
        if (phone.length < 9) { showMsg("err", "❌ ትክክለኛ ስልክ ቁጥር አስገባ (ቢያንስ 9 ቁጥር)"); return; }
        const newC = { id: Date.now(), name: cName.trim() || phone, phone };
        const merged = dedup([...contacts, newC]);
        if (merged.length === contacts.length) { showMsg("err", "⚠️ ይህ ስልክ ቁጥር አሳስቀ ነው።"); return; }
        saveC(merged);
        setCName(""); setCPhone("");
        showMsg("success", "✅ Contact ተጨምሯል!");
      };

      const toggleSel = (id) => { const s = new Set(selIds); s.has(id) ? s.delete(id) : s.add(id); setSelIds(s); };
      const filtered = contacts.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.phone.includes(search));
      const toggleAll = () => { if (selIds.size === filtered.length) setSelIds(new Set()); else setSelIds(new Set(filtered.map(c => c.id))); };
      const removeSelected = () => { if (!confirm(`${selIds.size} contacts ልሰርዝ?`)) return; saveC(contacts.filter(c => !selIds.has(c.id))); setSelIds(new Set()); setSelMode(false); };
      const exportSelected = () => {
        const csv = contacts.filter(c => selIds.has(c.id)).map(c => `${c.name},${c.phone}`).join("\n");
        const a = Object.assign(document.createElement("a"), { href: URL.createObjectURL(new Blob([csv], { type: "text/csv" })), download: "contacts_export.csv" });
        a.click();
      };

      const createGroup = () => {
        if (!gName.trim()) return;
        const g = { id: Date.now(), name: gName.trim(), contactIds: [] };
        saveG([...groups, g]); setGName(""); setOpenGrp(g.id); setGrpView("add");
      };
      const addToGroup = () => {
        const ids = Array.from(addSel);
        saveG(groups.map(g => g.id === openGrp ? { ...g, contactIds: Array.from(new Set([...g.contactIds, ...ids])) } : g));
        setAddSel(new Set()); setGrpView("list");
      };
      const removeFromGroup = (gId, cId) => saveG(groups.map(g => g.id === gId ? { ...g, contactIds: g.contactIds.filter(id => id !== cId) } : g));

      const sendSMS = async () => {
        let gc;
        if (msgGroup === "__ALL__") {
          gc = dedup(contacts);
        } else {
          const g = groups.find(g => g.id === msgGroup);
          if (!g) return;
          gc = dedup(g.contactIds.map(id => contacts.find(c => c.id === id)).filter(Boolean));
        }
        const groupName = msgGroup === "__ALL__" ? "ሁሉም Contacts" : groups.find(g => g.id === msgGroup)?.name || "";
        if (!message.trim() || !gc.length) return;
        cancelRef.current = false;
        setSending(true); setJustDone(false); setProgress(0); setSentN(0); setTotalN(gc.length);
        const ok = [], fail = [];
        for (let i = 0; i < gc.length; i++) {
          if (cancelRef.current) {
            const partialReport = {
              id: Date.now(), group: groupName + " (ተቋርጧል)",
              message: message.slice(0, 60) + (message.length > 60 ? "…" : ""),
              fullMessage: message, date: new Date().toLocaleString("am-ET"),
              ok: ok.map(c => ({ name: c.name, phone: c.phone })),
              fail: fail.map(c => ({ name: c.name, phone: c.phone })), total: i,
            };
            saveR([partialReport, ...reports].slice(0, 20));
            setSending(false); setJustDone(true); return;
          }
          await new Promise(r => setTimeout(r, 6));
          (Math.random() > 0.05 ? ok : fail).push(gc[i]);
          setSentN(i + 1); setProgress(Math.round(((i + 1) / gc.length) * 100));
        }
        const report = {
          id: Date.now(), group: groupName, fullMessage: message,
          message: message.slice(0, 60) + (message.length > 60 ? "…" : ""),
          date: new Date().toLocaleString("am-ET"),
          ok: ok.map(c => ({ name: c.name, phone: c.phone })),
          fail: fail.map(c => ({ name: c.name, phone: c.phone })), total: gc.length,
        };
        saveR([report, ...reports].slice(0, 20));
        setSending(false); setJustDone(true);
      };

      const cancelSend = () => { cancelRef.current = true; };
      const buildSmsLink = (phone, msg) => `sms:+251${phone}?body=${encodeURIComponent(msg)}`;
      const toggleReportExpand = (id, section) => setReportExpand(prev => ({ ...prev, [`${id}-${section}`]: !prev[`${id}-${section}`] }));

      if (loading) return <div style={{ color: "#c9a84c", textAlign: "center", paddingTop: 80, fontFamily: "sans-serif" }}>⏳ Loading…</div>;

      return (
        <>
          <style>{CSS}</style>
          <div className="app">
            <div className="hdr">
              <div className="hdr-icon">🕌</div>
              <div>
                <div className="hdr-title">ጁምዓ SMS</div>
                <div className="hdr-sub">የጁምዓ መልእክት አስተላላፊ</div>
              </div>
              <div className="hdr-badge">{contacts.length} contacts</div>
            </div>

            {/* ══ CONTACTS TAB ══ */}
            {tab === "contacts" && (
              <div className="page">
                <div className="stats">
                  <div className="stat"><div className="stat-n">{contacts.length}</div><div className="stat-l">Contacts</div></div>
                  <div className="stat"><div className="stat-n">{groups.length}</div><div className="stat-l">Groups</div></div>
                  <div className="stat"><div className="stat-n">{reports.length}</div><div className="stat-l">Reports</div></div>
                </div>

                {/* Import result message */}
                {importMsg && (
                  <div className={`notice ${importMsg.type === "success" ? "notice-success" : importMsg.type === "err" ? "notice-err" : "notice-info"}`}>
                    {importMsg.text}
                  </div>
                )}

                {/* Backup */}
                <div className="card">
                  <div className="card-title">💾 ምትኬ (Backup)</div>
                  <button className="email-backup-btn" onClick={emailBackup}>📧 ሁሉንም ውሂብ ወደ Email ላክ</button>
                  <div className="notice notice-info" style={{ fontSize: ".74rem" }}>Contacts, Groups እና Reports ሁሉም ወደ Email ይላካሉ። ውሂቡ እንዳይጠፋ ምትኬ ያድርጉ።</div>
                </div>

                {/* Import */}
                <div className="card">
                  <div className="card-title">📥 Contacts አስገባ</div>

                  {/* 4 import tiles */}
                  <div className="import-grid">
                    {/* VCF */}
                    <button className="import-tile tile-vcf" onClick={() => vcfRef.current.click()}>
                      <span className="ti2">📇</span>
                      <span>VCF ፋイل</span>
                      <span style={{ fontSize: ".65rem", opacity: .8 }}>ከ Contacts app</span>
                    </button>

                    {/* CSV */}
                    <button className="import-tile tile-csv" onClick={() => csvRef.current.click()}>
                      <span className="ti2">📋</span>
                      <span>CSV / TXT</span>
                      <span style={{ fontSize: ".65rem", opacity: .8 }}>ስም,ቁጥር format</span>
                    </button>

                    {/* VCF Guide */}
                    <button className="import-tile tile-phone" onClick={() => setShowVcfGuide(v => !v)}>
                      <span className="ti2">❓</span>
                      <span>VCF እንዴት?</span>
                      <span style={{ fontSize: ".65rem", opacity: .8 }}>መመሪያ ይመልከቱ</span>
                    </button>

                    {/* Paste */}
                    <button className="import-tile tile-paste" onClick={() => setShowPaste(!showPaste)}>
                      <span className="ti2">✏️</span>
                      <span>ቁጥሮች ለጥፍ</span>
                      <span style={{ fontSize: ".65rem", opacity: .8 }}>copy-paste</span>
                    </button>
                  </div>

                  {/* Hidden file inputs */}
                  <input ref={vcfRef} type="file" accept=".vcf,.vcard" style={{ display: "none" }} onChange={handleVcf} />
                  <input ref={csvRef} type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={handleCsv} />

                  {/* Paste area */}
                  {showPaste && (
                    <div style={{ marginTop: 10 }}>
                      <div className="paste-hint">
                        ቁጥሮቹን ከዚህ ለጥፍ። አንድ ቁጥር በአንድ ሕዳር፣ ወይም <b>ስም,ቁጥር</b> format ተጠቀም።<br />
                        ምሳሌ:<br />
                        0912345678<br />
                        አህመድ,0911222333
                      </div>
                      <textarea
                        className="paste-area"
                        placeholder={"0911234567\n0922345678\nАbebe,0933456789"}
                        value={pasteText}
                        onChange={e => setPasteText(e.target.value)}
                      />
                      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                        <button className="btn btn-gold" style={{ flex: 1 }} onClick={handlePaste} disabled={!pasteText.trim()}>✅ አስገባ</button>
                        <button className="btn btn-ghost" onClick={() => { setShowPaste(false); setPasteText(""); }}>✕</button>
                      </div>
                    </div>
                  )}

                  {/* VCF Step-by-step guide */}
                  {showVcfGuide && (
                    <div className="notice notice-info" style={{ marginTop: 10, lineHeight: 2 }}>
                      📱 <b>ስልክህ ላይ VCF እንዴት ያወጣሉ:</b><br />
                      1️⃣ ስልክህ <b>Contacts</b> app ክፈት<br />
                      2️⃣ ⋮ Menu (3 dots) → <b>Manage contacts</b> ወይም <b>Import/Export</b><br />
                      3️⃣ <b>Export contacts</b> ምረጥ<br />
                      4️⃣ <b>ሁሉንም ምረጥ</b> → <b>Export</b> ወይም <b>Share</b><br />
                      5️⃣ .vcf ፋイሉ Downloads ውስጥ ይቀምጣል<br />
                      6️⃣ ወደ app ተመልስ → <b>📇 VCF ፋイル</b> ተጫን → ፋイሉን ምረጥ<br />
                      <br />
                      ⚠️ Samsung ስልክ ከሆነ: Contacts → ⋮ → Import or export → Export to storage
                    </div>
                  )}

                  <div className="notice" style={{ marginTop: 10, fontSize: ".73rem" }}>
                    💡 <b>VCF ፋイሉ እንዴት ያግኙ?</b><br />
                    Phone Contacts app → Menu → Export → Export to VCF → ፋイሉን ምረጥ
                  </div>
                </div>

                {/* Manual add */}
                <div className="card">
                  <div className="card-title">✏️ አንድ ሰው ጨምር</div>
                  <div className="row"><input className="inp" placeholder="ስም (አማራጭ)" value={cName} onChange={e => setCName(e.target.value)} /></div>
                  <div className="row">
                    <input className="inp" placeholder="ስልክ ቁጥር *" value={cPhone} onChange={e => setCPhone(e.target.value)} type="tel" inputMode="numeric" />
                    <button className="btn btn-gold" onClick={addContact}>➕</button>
                  </div>
                </div>

                {/* Contact list */}
                {contacts.length > 0 && (
                  <div className="card">
                    <div className="card-title">
                      👥 ዝርዝር <span style={{ color: "var(--muted)", fontWeight: 400 }}>({contacts.length})</span>
                      <button className={`btn btn-sm ${selMode ? "btn-teal" : "btn-ghost"}`} style={{ marginLeft: "auto" }} onClick={() => { setSelMode(!selMode); setSelIds(new Set()); }}>{selMode ? "✕ ሰርዝ" : "☑️ ምረጥ"}</button>
                    </div>
                    <input className="inp" style={{ marginBottom: 10 }} placeholder="🔍 ፈልግ…" value={search} onChange={e => setSearch(e.target.value)} />
                    {selMode && (
                      <div className="action-bar">
                        <span className="action-count">{selIds.size > 0 ? `${selIds.size} ተምርጧል` : "Contact ምረጥ"}</span>
                        <span className="chip-all" onClick={toggleAll}>{selIds.size === filtered.length ? "ሁሉ አትምረጥ" : "ሁሉ ምረጥ"}</span>
                        {selIds.size > 0 && <><button className="btn btn-warn btn-sm" onClick={exportSelected}>📤 Export</button><button className="btn btn-danger btn-sm" onClick={removeSelected}>🗑️ ሰርዝ</button></>}
                      </div>
                    )}
                    <div className="scroll-list">
                      {filtered.map(c => (
                        <div key={c.id} className={`c-item ${selMode && selIds.has(c.id) ? "sel" : ""}`} onClick={() => selMode && toggleSel(c.id)}>
                          {selMode ? <span className="chk">{selIds.has(c.id) ? "✅" : "⬜"}</span> : <div className="c-avatar">{initials(c.name)}</div>}
                          <div className="c-info"><div className="c-name">{c.name}</div><div className="c-phone">{c.phone}</div></div>
                          {!selMode && <button className="btn btn-danger btn-sm" onClick={e => { e.stopPropagation(); saveC(contacts.filter(x => x.id !== c.id)); }}>✕</button>}
                        </div>
                      ))}
                    </div>
                    <hr />
                    <button className="btn btn-danger btn-full" onClick={() => { if (confirm("ሁሉንም contacts ልሰርዝ?")) { saveC([]); setSelMode(false); setSelIds(new Set()); } }}>🗑️ ሁሉንም ሰርዝ</button>
                  </div>
                )}
              </div>
            )}

            {/* ══ GROUPS TAB ══ */}
            {tab === "groups" && (
              <div className="page">
                <div className="card">
                  <div className="card-title">➕ አዲስ Group</div>
                  <div className="row">
                    <input className="inp" placeholder="Group ስም" value={gName} onChange={e => setGName(e.target.value)} />
                    <button className="btn btn-gold" onClick={createGroup}>➕</button>
                  </div>
                </div>
                {groups.length === 0 ? <div className="card"><div className="empty"><div className="ei">📂</div><p>Group አልተሰራም</p></div></div>
                  : groups.map(g => {
                    const gc = g.contactIds.map(id => contacts.find(c => c.id === id)).filter(Boolean);
                    const open = openGrp === g.id;
                    return (
                      <div className="card" key={g.id}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: open ? 12 : 0 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 700 }}>{g.name}</div>
                            <div style={{ fontSize: ".72rem", color: "var(--muted)", marginTop: 1 }}>{gc.length} ተቀባዮች</div>
                          </div>
                          <button className="btn btn-teal btn-sm" onClick={() => { setOpenGrp(open ? null : g.id); setGrpView("list"); setAddSel(new Set()); }}>{open ? "▲" : "▼"}</button>
                          <button className="btn btn-danger btn-sm" onClick={() => { if (confirm(`"${g.name}" ልሰርዝ?`)) saveG(groups.filter(x => x.id !== g.id)); }}>🗑️</button>
                        </div>
                        {open && (
                          <>
                            <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                              <button className={`btn btn-sm ${grpView === "list" ? "btn-teal" : "btn-ghost"}`} onClick={() => setGrpView("list")}>ዝርዝር</button>
                              <button className={`btn btn-sm ${grpView === "add" ? "btn-gold" : "btn-ghost"}`} onClick={() => { setGrpView("add"); setAddSel(new Set()); }}>+ Contact ጨምር</button>
                            </div>
                            {grpView === "list" && (
                              <div className="scroll-list">
                                {gc.length === 0 ? <div className="empty" style={{ padding: 14 }}><p>Contact አልተጨመረም</p></div>
                                  : gc.map(c => (
                                    <div className="c-item" key={c.id}>
                                      <div className="c-avatar">{initials(c.name)}</div>
                                      <div className="c-info"><div className="c-name">{c.name}</div><div className="c-phone">{c.phone}</div></div>
                                      <button className="btn btn-danger btn-sm" onClick={() => removeFromGroup(g.id, c.id)}>✕</button>
                                    </div>
                                  ))}
                              </div>
                            )}
                            {grpView === "add" && (
                              <>
                                <div className="sel-bar">
                                  <span className="sel-lbl">{addSel.size} ተምርጧል</span>
                                  <span className="chip-all" onClick={() => {
                                    const notIn = contacts.filter(c => !g.contactIds.includes(c.id));
                                    setAddSel(addSel.size === notIn.length ? new Set() : new Set(notIn.map(c => c.id)));
                                  }}>ሁሉ ምረጥ</span>
                                </div>
                                <div className="scroll-list" style={{ marginBottom: 10 }}>
                                  {contacts.filter(c => !g.contactIds.includes(c.id)).map(c => (
                                    <div key={c.id} className="c-item"
                                      style={{ borderColor: addSel.has(c.id) ? "rgba(26,138,122,.4)" : "rgba(255,255,255,.05)", background: addSel.has(c.id) ? "rgba(26,138,122,.07)" : "" }}
                                      onClick={() => { const s = new Set(addSel); s.has(c.id) ? s.delete(c.id) : s.add(c.id); setAddSel(s); }}>
                                      <span className="chk">{addSel.has(c.id) ? "✅" : "⬜"}</span>
                                      <div className="c-info"><div className="c-name">{c.name}</div><div className="c-phone">{c.phone}</div></div>
                                    </div>
                                  ))}
                                  {contacts.filter(c => !g.contactIds.includes(c.id)).length === 0 && <div className="empty" style={{ padding: 14 }}><p>ሁሉም contacts ተጨምረዋል</p></div>}
                                </div>
                                <button className="btn btn-gold btn-full" disabled={addSel.size === 0} onClick={addToGroup}>✅ {addSel.size} contacts ጨምር</button>
                              </>
                            )}
                          </>
                        )}
                      </div>
                    );
                  })}
              </div>
            )}

            {/* ══ SEND TAB ══ */}
            {tab === "send" && (
              <div className="page">
                {justDone ? (
                  <div className="card" style={{ textAlign: "center", padding: 30 }}>
                    <div style={{ fontSize: "3.2rem", marginBottom: 10 }}>✅</div>
                    <div style={{ fontSize: "1.05rem", color: "var(--gold)", fontWeight: 700, marginBottom: 6 }}>SMS ተላከ!</div>
                    <div style={{ color: "var(--muted)", fontSize: ".82rem", marginBottom: 18 }}>Reports tab ላይ ዝርዝሩን ይመልከቱ</div>
                    <button className="btn btn-gold btn-full" onClick={() => { setJustDone(false); setMessage(""); }}>➕ አዲስ መልእክት</button>
                  </div>
                ) : sending ? (
                  <div className="card">
                    <div className="card-title">📤 እየተላከ ነው…</div>
                    <div style={{ textAlign: "center", color: "var(--gold)", fontSize: "1.4rem", fontWeight: 700, margin: "8px 0" }}>{sentN} / {totalN}</div>
                    <div className="prog-wrap"><div className="prog-fill" style={{ width: `${progress}%` }} /></div>
                    <div style={{ textAlign: "center", color: "var(--muted)", fontSize: ".78rem" }}>{progress}% ተጠናቅቋል</div>
                    <div className="cancel-block">
                      <button className="btn btn-cancel btn-full" onClick={cancelSend}>⛔ ላከ ቋርጥ</button>
                      <div style={{ fontSize: ".72rem", color: "var(--muted)", marginTop: 6 }}>ከዚህ በፊት የተላኩት ይቀመጣሉ</div>
                    </div>
                  </div>
                ) : (
                  <>
                    <div className="card">
                      <div className="card-title">📂 ለማን ይላካል?</div>
                      {/* ALL CONTACTS option */}
                      <div
                        className={`g-pill ${msgGroup === "__ALL__" ? "sel" : ""}`}
                        style={{ background: msgGroup === "__ALL__" ? "rgba(201,168,76,.22)" : "rgba(201,168,76,.08)", borderColor: msgGroup === "__ALL__" ? "var(--gold)" : "rgba(201,168,76,.2)", color: msgGroup === "__ALL__" ? "#e0c060" : "var(--gold)" }}
                        onClick={() => setMsgGroup("__ALL__")}
                      >
                        👥 ሁሉም Contacts <span className="cnt">{contacts.length}</span>
                      </div>
                      {groups.map(g => (
                        <div key={g.id} className={`g-pill ${msgGroup === g.id ? "sel" : ""}`} onClick={() => setMsgGroup(g.id)}>
                          {g.name} <span className="cnt">{g.contactIds.length}</span>
                        </div>
                      ))}
                      {contacts.length === 0 && <div className="notice">⚠️ Contacts tab ሄደህ contacts ጨምር!</div>}
                    </div>
                    <div className="card">
                      <div className="card-title">📖 አያ ምረጥ ወይም ጻፍ</div>
                      {VERSES.map((v, i) => <div key={i} className={`verse-chip ${message === v ? "picked" : ""}`} onClick={() => setMessage(v)}>{v}</div>)}
                      <hr />
                      <textarea className="ta" placeholder="ወይም የራስህን ጻፍ…" value={message} onChange={e => setMessage(e.target.value)} />
                      <div style={{ textAlign: "right", fontSize: ".72rem", color: "var(--muted)", marginTop: 5 }}>{message.length} ፊደላት · {Math.ceil(message.length / 160) || 1} SMS</div>
                    </div>
                    <button className="send-btn" disabled={!msgGroup || !message.trim() || contacts.length === 0} onClick={sendSMS}>
                      📤 ለሁሉም ላክ ({msgGroup === "__ALL__" ? contacts.length : (groups.find(g => g.id === msgGroup)?.contactIds.length || 0)} ሰዎች)
                    </button>
                  </>
                )}
              </div>
            )}

            {/* ══ REPORTS TAB ══ */}
            {tab === "reports" && (
              <div className="page">
                {reports.length === 0 ? <div className="card"><div className="empty"><div className="ei">📊</div><p>Report የለም</p></div></div>
                  : reports.map(r => (
                    <div className="card" key={r.id}>
                      <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10 }}>
                        <div>
                          <div style={{ fontWeight: 700 }}>{r.group}</div>
                          <div style={{ fontSize: ".7rem", color: "var(--muted)", marginTop: 2 }}>{r.date}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ color: "var(--success)", fontSize: ".78rem", fontWeight: 700 }}>✅ {r.ok.length}</div>
                          <div style={{ color: "var(--danger)", fontSize: ".78rem", fontWeight: 700 }}>❌ {r.fail.length}</div>
                        </div>
                      </div>
                      <div style={{ fontSize: ".76rem", color: "var(--muted)", marginBottom: 8, fontStyle: "italic", textAlign: "right", direction: "rtl", fontFamily: "Amiri, serif" }}>"{r.message}"</div>
                      <div className="prog-wrap"><div className="prog-fill" style={{ width: `${Math.round((r.ok.length / r.total) * 100)}%` }} /></div>
                      <div style={{ fontSize: ".7rem", color: "var(--muted)", textAlign: "right", marginBottom: 10 }}>{Math.round((r.ok.length / r.total) * 100)}% ደርሷል</div>
                      <div className="report-toggle">
                        {r.ok.length > 0 && <button className="btn btn-sm" style={{ background: "rgba(61,184,122,.1)", color: "#7de0ae", border: "1px solid rgba(61,184,122,.2)" }} onClick={() => toggleReportExpand(r.id, "ok")}>✅ {reportExpand[`${r.id}-ok`] ? "▲ ደረሳቸው ደብቅ" : `▼ ${r.ok.length} ደረሳቸው`}</button>}
                        {r.fail.length > 0 && <button className="btn btn-sm" style={{ background: "rgba(224,85,85,.1)", color: "#f09090", border: "1px solid rgba(224,85,85,.2)" }} onClick={() => toggleReportExpand(r.id, "fail")}>❌ {reportExpand[`${r.id}-fail`] ? "▲ ያልደረሳቸው ደብቅ" : `▼ ${r.fail.length} ያልደረሳቸው`}</button>}
                      </div>
                      {reportExpand[`${r.id}-ok`] && r.ok.length > 0 && (
                        <div className="scroll-list" style={{ maxHeight: 180 }}>
                          {r.ok.map((f, i) => <div key={i} className="r-row r-ok" style={{ justifyContent: "space-between" }}><span>✅ {f.name} · {f.phone}</span><a href={buildSmsLink(f.phone, r.fullMessage || r.message)} className="sms-link">📱 ላክ</a></div>)}
                        </div>
                      )}
                      {reportExpand[`${r.id}-fail`] && r.fail.length > 0 && (
                        <div className="scroll-list" style={{ maxHeight: 180 }}>
                          {r.fail.map((f, i) => <div key={i} className="r-row r-fail" style={{ justifyContent: "space-between" }}><span>❌ {f.name} · {f.phone}</span><a href={buildSmsLink(f.phone, r.fullMessage || r.message)} className="sms-link">📱 እንደገና ላክ</a></div>)}
                        </div>
                      )}
                    </div>
                  ))}
              </div>
            )}

            <div className="tabs">
              {[{ id: "contacts", icon: "👥", label: "Contacts" }, { id: "groups", icon: "📂", label: "Groups" }, { id: "send", icon: "📤", label: "ላክ" }, { id: "reports", icon: "📊", label: "Reports" }].map(t => (
                <button key={t.id} className={`tab ${tab === t.id ? "on" : ""}`} onClick={() => setTab(t.id)}>
                  <span className="ti">{t.icon}</span>{t.label}
                </button>
              ))}
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
